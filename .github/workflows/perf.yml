# .github/workflows/perf.yml
# Triggers: pull_request to develop or main.
# Measures end-to-end latency + RunStats.first_token_ms.
# Fails if first-token median > 1500 ms on fast path or p50/p95 regress >10%.
name: Performance regression

on:
  pull_request:
    branches: [develop, main]

jobs:
  perf:
    name: Performance regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch develop baseline for comparison
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --group dev
      - name: Check for perf tests
        id: has_perf
        run: |
          if find tests/perf -name "test_*.py" 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No perf tests yet (Phase 11 will populate tests/perf/). Skipping benchmark run."
          fi
      - name: Run perf suite
        if: steps.has_perf.outputs.exists == 'true'
        run: |
          uv run pytest -m perf \
            --benchmark-json=perf-results.json \
            --benchmark-min-rounds=5 \
            -v
      - name: Upload benchmark results
        if: steps.has_perf.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: perf-results.json
