# .pre-commit-config.yaml
# Run: uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
# Update hooks: uv run pre-commit autoupdate
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        # MkDocs Material uses Python-tagged YAML (!!python/name:...) which is
        # safe in this controlled config but not safe-loadable by check-yaml.
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - pydantic[mypy]
          - httpx>=0.27
          - anyio>=4.3
          - respx>=0.21
          - pytest>=8.0
          - aiosqlite>=0.20
          - tree-sitter>=0.22
          - tree-sitter-python>=0.23
          - tree-sitter-javascript>=0.23
          - tree-sitter-typescript>=0.23
        args: [--config-file=pyproject.toml]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.6.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: uv\.lock
